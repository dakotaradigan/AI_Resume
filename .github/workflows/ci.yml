name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt ruff
      - name: Lint
        run: ruff check backend evals/scripts
      - name: Test
        run: PYTHONPATH=backend USE_RAG=false python -m unittest discover -s backend -p 'test*.py' -v
